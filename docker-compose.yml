services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: talent_graph
      POSTGRES_PASSWORD: talent_graph
      POSTGRES_DB: talent_graph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent_graph -d talent_graph"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/talent_graph
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p talent_graph 'RETURN apoc.version()' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://talent_graph:talent_graph@postgres:5432/talent_graph
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: talent_graph
      ENVIRONMENT: production
      API_KEY: ${API_KEY:-change-me-in-production}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      LOG_FORMAT: json
      RATE_LIMIT_STORAGE_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "talent_graph.scripts.scheduler"]
    environment:
      DATABASE_URL: postgresql+asyncpg://talent_graph:talent_graph@postgres:5432/talent_graph
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: talent_graph
      ENVIRONMENT: production
      API_KEY: ${API_KEY:-change-me-in-production}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SCHEDULER_OPENALEX_QUERY: ${SCHEDULER_OPENALEX_QUERY:-multimodal dialogue}
      SCHEDULER_OPENALEX_MAX_RESULTS: ${SCHEDULER_OPENALEX_MAX_RESULTS:-200}
      SCHEDULER_GITHUB_REPOS: '${SCHEDULER_GITHUB_REPOS:-["huggingface/transformers"]}'
      SCHEDULER_INTERVAL_HOURS: ${SCHEDULER_INTERVAL_HOURS:-6}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: on-failure
    profiles:
      - app

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
