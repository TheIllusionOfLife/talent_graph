name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: talent_graph
          POSTGRES_PASSWORD: talent_graph
          POSTGRES_DB: talent_graph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/talent_graph
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p talent_graph 'RETURN 1'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    env:
      DATABASE_URL: postgresql+asyncpg://talent_graph:talent_graph@localhost:5432/talent_graph
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: talent_graph
      API_KEY: test-key
      LOG_FORMAT: text

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --cov=src/talent_graph --cov-report=xml -v

      - name: Run mypy
        run: uv run mypy src/ tests/ --ignore-missing-imports

      - name: Install pre-commit
        run: uv run pip install pre-commit

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23" # pin to tested version; bump when upgrading

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Unit tests (Vitest)
        run: bun run test

      - name: Build
        run: bun run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
        continue-on-error: true

  playwright:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: talent_graph
          POSTGRES_PASSWORD: talent_graph
          POSTGRES_DB: talent_graph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/talent_graph
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p talent_graph 'RETURN 1'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s

    env:
      DATABASE_URL: postgresql+asyncpg://talent_graph:talent_graph@localhost:5432/talent_graph
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: talent_graph
      API_KEY: test-key
      LOG_FORMAT: text

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Start backend
        run: uv run uvicorn talent_graph.api.main:create_app --factory --host 0.0.0.0 --port 8000 &

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx', 'frontend/**/*.css', 'frontend/package.json', 'frontend/bun.lock', 'frontend/next.config.*', 'frontend/tailwind.config.*') }}
          restore-keys: ${{ runner.os }}-nextjs-

      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start" && exit 1

      - name: Run E2E tests
        working-directory: frontend
        run: bun run test:e2e
        env:
          CI: true
